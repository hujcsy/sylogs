name: Fetch news and send to Cloudflare D1
on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
jobs:
  fetch-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch RSS and POST to Cloudflare Worker
        env:
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
        run: |
          python - <<'PY'
          import json
          import os
          from urllib.parse import urlencode
          from urllib.request import Request, urlopen
          import xml.etree.ElementTree as ET
          categories = [
              ("時事", "國際 OR 世界"),
              ("科技動態", "科技"),
              ("焦點新聞", "熱門新聞"),
              ("金融", "金融 OR 財經"),
          ]
          def get_items(query):
              url = "https://news.google.com/rss/search?" + urlencode({
                  "q": query, "hl": "zh-TW", "gl": "TW", "ceid": "TW:zh-Hant"
              })
              req = Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urlopen(req, timeout=30) as response:
                  root = ET.fromstring(response.read())
              items = []
              for item in root.findall("./channel/item")[:15]:
                  title = (item.findtext("title") or "").strip()
                  link = (item.findtext("link") or "").strip()
                  source = item.find("source")
                  source = source.text.strip() if source is not None and source.text else "Google 新聞"
                  if title and link:
                      items.append({"title": title, "link": link, "source": source})
              return items
          all_articles = []
          for cat_name, query in categories:
              try:
                  items = get_items(query)
                  for it in items:
                      it["category"] = cat_name
                      all_articles.append(it)
                  print(f"{cat_name}: 抓到 {len(items)} 筆")
              except Exception as e:
                  print(f"{cat_name} 抓取失敗: {e}")
          payload = json.dumps({"articles": all_articles}).encode("utf-8")
          secret = os.environ["INGEST_SECRET"]
          req = Request(
              "https://sylogs-news-fetcher.hjlaochi-27c.workers.dev/ingest",
              data=payload,
              method="POST",
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {secret}",
                  "User-Agent": "Mozilla/5.0 (compatible; sylogs-bot/1.0)",
              },
          )
          with urlopen(req, timeout=120) as resp:
              print("回應:", resp.read().decode("utf-8"))
          PY
