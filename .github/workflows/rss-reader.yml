name: Auto Fetch RSS News

on:
  schedule:
    - cron: '0 */6 * * *' # 每隔 6 小时自动抓取一次
  workflow_dispatch: # 支持手动点击运行

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch RSS Feeds
        uses: sarisia/actions-readme-feed@v1
        with:
          url: |
            "https://zaobao.com"
            "https://bbci.co.uk"
            "https://bbci.co.uk"
            "https://apnews.com"
            "https://36kr.com"
            "https://ifanr.com"
            "https://techcrunch.com"
            "https://theverge.com"
            "https://reutersagency.com"
            "https://theinitium.com"
            "https://nytimes.com"
            "https://wallstreetcn.com"
            "https://cnbc.com"
            "https://ft.com"
          max_post_num: 5
          file: "news-list.md" # 抓取的新闻会写入这个文件
          format: |
            - [${title}](${url}) (${date})
            
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add .
          git commit -m "chore: auto fetch latest news [skip ci]" || exit 0
          git push
