name: 獲取新聞

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: 結帳代碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 運行抓取腳本
        run: |
          python -c "
          import os
          os.makedirs('news', exist_ok=True)
          
          # 完整對應您選單中的四個板塊
          categories = ['時事', '科技動態', '焦點新聞', '金融']
          
          # 生成 HTML 列表
          html_list = '<ul>' + ''.join([f\"<li><a href='#'>{cat}</a></li>\" for cat in categories]) + '</ul>'
          
          content = f'''<!DOCTYPE html>
          <html>
          <head><meta charset='UTF-8'><title>新聞追蹤</title></head>
          <body>
            <h1>新聞追蹤</h1>
            {html_list}
            <br><a href='../'>回網站首頁</a>
          </body>
          </html>'''
          with open('news/index.html', 'w', encoding='utf-8') as f:
              f.write(content)
          "

      - name: 提交並推送更改
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add news/index.html
          git commit -m '更新新聞分類列表' || echo '無變更'
          git push
