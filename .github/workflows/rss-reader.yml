name: Auto Fetch RSS News

on:
  schedule:
    - cron: '0 */6 * * *' # 每隔 6 小时自动抓取一次
  workflow_dispatch: # 支持手动点击运行

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch RSS Feeds
        uses: sarisia/actions-readme-feed@v1
        with:
          url: |
            "https://zaobao.com/rss/world"
"
            "https://bbci.co.uk"
            "http://cnn.com"
            "https://allrss.org"
            "https://36kr.com"
            "https://ifanr.com"
          max_entry: 5
          file: "news-list.md"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add .
          git commit -m "chore: auto fetch latest news [skip ci]" || exit 0
          git push
