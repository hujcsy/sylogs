name: 獲取新聞

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: 結帳代碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 運行抓取腳本
        run: |
          python -c "
          import os
          os.makedirs('news', exist_ok=True)
          index_content = '''<!DOCTYPE html>
          <html>
          <head><meta charset='UTF-8'><title>News</title></head>
          <body>
          <h1>News</h1>
          <ul>
            <li><a href='/sylogs/news/index.html'>Current Events</a></li>
            <li><a href='/sylogs/news/index.html'>Tech Trends</a></li>
            <li><a href='/sylogs/news/index.html'>Focus</a></li>
            <li><a href='/sylogs/news/index.html'>Finance</a></li>
          </ul>
          <br><a href='/sylogs/'>Back to Home</a>
          </body>
          </html>'''
          with open('news/index.html', 'w', encoding='utf-8') as f:
              f.write(index_content)
          "

      - name: 提交並推送更改
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m '更新新聞頁面' || echo '無變更'
          git push
