name: 獲取新聞

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:

    runs-on: ubuntu-latest

    steps:

      - name: 結帳代碼
        uses: actions/checkout@v4


      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'


      - name: 生成新聞頁面
        run: |
          python - <<'PY'

          import os


          categories = {
              "時事": "shishi",
              "科技動態": "tech",
              "焦點新聞": "focus",
              "金融": "finance"
          }


          os.makedirs("news", exist_ok=True)


          # 生成分類首頁

          links = ""

          for name, folder in categories.items():

              os.makedirs(f"news/{folder}", exist_ok=True)


              page = f"""
              <!DOCTYPE html>
              <html>
              <head>
              <meta charset="UTF-8">
              <title>{name} - 新聞追蹤</title>
              </head>

              <body>

              <h1>{name}</h1>

              <p>新聞內容自動更新中...</p>

              <br>

              <a href="/news/">返回新聞首頁</a>

              </body>
              </html>
              """


              with open(
                  f"news/{folder}/index.html",
                  "w",
                  encoding="utf-8"
              ) as f:
                  f.write(page)



              links += f"""
              <li>
              <a href="/news/{folder}/">
              {name}
              </a>
              </li>
              """



          # 生成新聞首頁


          home = f"""
          <!DOCTYPE html>

          <html>

          <head>

          <meta charset="UTF-8">

          <title>新聞追蹤</title>

          </head>


          <body>


          <h1>新聞追蹤</h1>


          <ul>

          {links}

          </ul>


          <br>


          <a href="/">返回網站首頁</a>


          </body>


          </html>
          """


          with open(
              "news/index.html",
              "w",
              encoding="utf-8"
          ) as f:

              f.write(home)


          PY



      - name: 提交並推送更改

        run: |

          git config --global user.name 'github-actions[bot]'

          git config --global user.email 'github-actions[bot]@users.noreply.github.com'


          git add news/


          git commit -m "更新新聞分類頁面" || echo "無變更"


          git push
