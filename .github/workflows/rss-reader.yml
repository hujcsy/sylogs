name: 獲取新聞

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: 結帳代碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 運行抓取腳本
        run: |
          python -c "
          import os
          os.makedirs('news', exist_ok=True)
          content = '''
          <div class='news-list'>
            <ul>
              <li><a href='#'>時事新聞內容更新...</a></li>
              <li><a href='#'>科技動態內容更新...</a></li>
            </ul>
          </div>
          '''
          with open('news/list.html', 'w', encoding='utf-8') as f:
              f.write(content)
          "

      - name: 提交並推送更改
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add news/list.html
          git commit -m '更新新聞列表' || echo '無變更'
          git push
