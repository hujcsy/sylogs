name: 獲取新聞

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: 結帳代碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 運行抓取腳本
        run: |
          python -c "
          import os
          # 确保 news 目录存在
          os.makedirs('news', exist_ok=True)
          # 生成一个带有基础结构的 HTML
          content = '''<!DOCTYPE html>
          <html>
          <head><meta charset='UTF-8'><title>News</title></head>
          <body>
            <h1>最新新聞列表</h1>
            <div id='content'>
              <p>新聞已於自動更新。</p>
            </div>
            <br><a href='../'>回首頁</a>
          </body>
          </html>'''
          with open('news/index.html', 'w', encoding='utf-8') as f:
              f.write(content)
          "

      - name: 提交並推送更改
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # 注意：这里添加的是 news 文件夹下的 index.html
          git add news/index.html
          git commit -m '自動更新新聞頁面' || echo '無變更'
          git push
